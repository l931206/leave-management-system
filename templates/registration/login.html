{% extends "base.html" %}
{% block title %}登入｜請假系統{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4 p-md-5">
      <h1 class="h3 fw-bold mb-2">員工請假系統</h1>
      <p class="text-secondary mb-4">請使用公司帳號登入</p>
      {% if form.errors %}
      <div class="alert alert-danger">帳號或密碼錯誤。</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="id_username">帳號</label>
          <input class="form-control" type="text" name="username" autofocus required id="id_username">
        </div>
        <div class="mb-4">
          <label class="form-label" for="id_password">密碼</label>
          <input class="form-control" type="password" name="password" required id="id_password">
        </div>
        <button class="btn btn-primary w-100">登入</button>
      </form>
      <div class="demo-box mt-4">
        <strong>展示帳號</strong><br>
        員工：employee / demo1234<br>
        主管：manager / demo1234<br>
        管理者：admin / demo1234
      </div>
    </div>
  </div>
</div>
{% endblock %}
