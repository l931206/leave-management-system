{% load static %}
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}兆迪聯智科技有限公司｜請假系統{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">兆迪聯智科技有限公司</a>
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center gap-2">
      <span class="small text-secondary d-none d-md-inline">
        {{ user.get_full_name|default:user.username }}
      </span>
      <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="btn btn-outline-secondary btn-sm">登出</button>
      </form>
    </div>
    {% endif %}
  </div>
</nav>

<main class="container py-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>

<footer class="container pb-4 text-center text-secondary small">
  員工請假與晚到通知系統
</footer>
</body>
</html>
